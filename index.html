<!DOCTYPE html>
<html>
<head>
<title>Admin Login - Sunny CSC</title>

<style>
body {
  font-family: Arial;
  background: #f1f5f9;
  text-align: center;
  padding-top: 80px;
}

.box {
  background: white;
  padding: 30px;
  display: inline-block;
  border-radius: 10px;
  box-shadow: 0 0 10px #ccc;
}

input {
  padding: 10px;
  width: 250px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: #0b3d91;
  color: white;
  border: none;
  border-radius: 5px;
}
</style>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "Sunnycsc" && pass === "12345"){
    alert("Login Successful");
    window.location.href = "admin.html";
  } else {
    alert("Invalid Username or Password");
  }
}
</script>

</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input id="user" placeholder="Username"><br>
<input id="pass" type="password" placeholder="Password"><br>

<button onclick="login()">Login</button>
</div>

</body>
</html>
