<!DOCTYPE html>
<html>
<head>
<title>Admin Login</title>

<script>
function login(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "admin" && pass === "1234"){
    window.location.href = "admin.html";
  } else {
    alert("Invalid Login!");
  }
}
</script>

</head>

<body style="text-align:center; padding:50px;">

<h2>Admin Login</h2>

<input id="user" placeholder="Admin"><br><br>
<input id="pass" type="12345" placeholder="Password"><br><br>

<button onclick="login()">Login</button>

</body>
</html>
<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<style>
body {font-family: Arial; background:#f1f5f9;}
.card {
  background:white;
  padding:15px;
  margin:10px;
  border-radius:10px;
}
button {
  padding:8px;
  margin:5px;
  color:white;
  border:none;
}
.approve {background:green;}
.reject {background:red;}
</style>

<script>
function loadData(){
  let data = JSON.parse(localStorage.getItem("cscData")) || [];
  let output = "";

  data.forEach((e,i)=>{
    output += `
    <div class="card">
    <b>Name:</b> ${e.name}<br>
    <b>Mobile:</b> ${e.mobile}<br>
    <b>Service:</b> ${e.service}<br>
    <b>Status:</b> ${e.status}<br>

    <button class="approve" onclick="update(${i},'Approved')">Approve</button>
    <button class="reject" onclick="update(${i},'Rejected')">Reject</button>
    </div>
    `;
  });

  document.getElementById("data").innerHTML = output;
}

function update(i,status){
  let data = JSON.parse(localStorage.getItem("cscData"));

  data[i].status = status;
  localStorage.setItem("cscData", JSON.stringify(data));

  // SMS DEMO
  alert("SMS sent to " + data[i].mobile + ": Your request is " + status);

  loadData();
}
</script>

</head>

<body onload="loadData()">

<h2 style="text-align:center;">Admin Panel</h2>

<div id="data"></div>

</body>
</html>
